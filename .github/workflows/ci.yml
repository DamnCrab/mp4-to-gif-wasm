name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install FFmpeg runtime for fixture generation
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Prepare FFmpeg source checkout
        run: npm run prepare:ffmpeg

      - name: Install Emscripten SDK
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install latest
          "$RUNNER_TEMP/emsdk/emsdk" activate latest

      - name: Run verification
        shell: bash
        run: |
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          npm run check
          npm test
          npm run build:native
          npm run build
          npm run test:real-videos
          npm run test:e2e-native
          npx wrangler deploy --dry-run
